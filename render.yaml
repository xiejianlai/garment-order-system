services:
  # PostgreSQL 数据库
  - type: pserv
    name: garment-order-db
    plan: free
    envVars:
      - key: POSTGRES_DB
        value: garment_order

  # NestJS 后端服务
  - type: web
    name: garment-order-api
    plan: free
    env: node
    region: oregon
    buildCommand: cd backend && npm install && npx prisma generate && npm run build
    startCommand: cd backend && npx prisma db push && npx prisma generate && node dist/main.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: garment-order-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

databases:
  - name: garment-order-db
    databaseName: garment_order
    plan: free

services:
  - type: web
    name: garment-order-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: cd backend && npm install && npx prisma generate && npm run build
    startCommand: cd backend && npx prisma db push && npx ts-node prisma/seed.ts || true && node dist/main.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: garment-order-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

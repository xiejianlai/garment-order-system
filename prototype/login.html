<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>外贸服装订单管理系统 - 登录</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.card { background: #fff; border-radius: 16px; padding: 32px 24px; width: 100%; max-width: 360px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
h1 { text-align: center; font-size: 20px; color: #333; margin-bottom: 8px; }
.sub { text-align: center; font-size: 13px; color: #999; margin-bottom: 24px; }
label { display: block; font-size: 13px; color: #666; margin-bottom: 6px; font-weight: 500; }
input { width: 100%; height: 44px; border: 2px solid #e0e0e0; border-radius: 8px; padding: 0 12px; font-size: 16px; margin-bottom: 16px; outline: none; transition: border-color 0.2s; }
input:focus { border-color: #667eea; }
.btn { width: 100%; height: 44px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin-bottom: 12px; }
.btn-login { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
.btn-login:active { transform: scale(0.98); }
.btn-wx { background: #07c160; color: #fff; }
.link { text-align: center; font-size: 13px; color: #667eea; cursor: pointer; }
.msg { min-height: 20px; text-align: center; font-size: 13px; margin-bottom: 12px; }
.msg.err { color: #e53e3e; }
.msg.ok { color: #38a169; }
.msg.info { color: #667eea; }
.spin { display: inline-block; width: 14px; height: 14px; border: 2px solid #ccc; border-top-color: #667eea; border-radius: 50%; animation: sp 0.8s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes sp { to { transform: rotate(360deg); } }
.demo { background: #f7fafc; border-radius: 8px; padding: 12px; font-size: 12px; color: #718096; margin-top: 16px; }
.demo b { color: #4a5568; }
</style>
</head>
<body>
<div class="card">
<h1>外贸服装订单管理</h1>
<p class="sub">请登录您的账号</p>
<div id="msg" class="msg"></div>
<div>
<label>公司代码</label>
<input type="text" id="company" value="DEMO01" placeholder="公司代码">
<label>用户名</label>
<input type="text" id="username" value="admin" placeholder="用户名">
<label>密码</label>
<input type="password" id="password" value="123456" placeholder="密码">
</div>
<button class="btn btn-login" id="btnLogin" onclick="doLogin()">登 录</button>
<button class="btn btn-wx" onclick="alert('微信登录需要小程序环境')">微信一键登录</button>
<p class="link" onclick="document.getElementById('msg').innerHTML='请联系管理员开通账号'" style="margin-top:12px">没有账号？注册新公司</p>
<div class="demo">
<b>测试账号：</b><br>
公司代码：DEMO01<br>
用户名：admin<br>
密码：123456
</div>
</div>
<script>
function showMsg(text, type) {
  var m = document.getElementById('msg');
  m.className = 'msg ' + (type || 'info');
  m.innerHTML = text;
}

function doLogin() {
  var company = document.getElementById('company').value.trim();
  var username = document.getElementById('username').value.trim();
  var password = document.getElementById('password').value.trim();

  if (!company || !username || !password) {
    showMsg('请填写所有字段', 'err');
    return;
  }

  var btn = document.getElementById('btnLogin');
  btn.disabled = true;
  btn.textContent = '登录中...';
  showMsg('<span class="spin"></span>正在连接服务器...', 'info');

  var xhr = new XMLHttpRequest();
  var url = '/api/auth/login';
  var data = JSON.stringify({
    companyCode: company,
    username: username,
    password: password
  });

  xhr.open('POST', url, true);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.timeout = 120000;

  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4) {
      btn.disabled = false;
      btn.textContent = '登 录';

      if (xhr.status === 0) {
        showMsg('无法连接服务器，正在重试...', 'err');
        setTimeout(function() { doLogin(); }, 3000);
        return;
      }

      try {
        var res = JSON.parse(xhr.responseText);
      } catch(e) {
        showMsg('服务器返回异常: ' + xhr.responseText.substring(0, 100), 'err');
        return;
      }

      if (xhr.status === 200 || xhr.status === 201) {
        if (res.data && res.data.token) {
          showMsg('登录成功！正在跳转...', 'ok');
          localStorage.setItem('authToken', res.data.token);
          localStorage.setItem('currentUser', JSON.stringify(res.data.user || {}));
          setTimeout(function() {
            window.location.href = '/index.html?t=' + Date.now();
          }, 500);
        } else {
          showMsg('登录返回数据异常', 'err');
        }
      } else {
        var errMsg = '登录失败';
        if (res.message) errMsg = res.message;
        if (res.data && res.data.message) errMsg = res.data.message;
        showMsg(errMsg, 'err');
      }
    }
  };

  xhr.ontimeout = function() {
    btn.disabled = false;
    btn.textContent = '登 录';
    showMsg('请求超时，正在重试...', 'err');
    setTimeout(function() { doLogin(); }, 3000);
  };

  xhr.onerror = function() {
    btn.disabled = false;
    btn.textContent = '登 录';
    showMsg('网络错误，正在重试...', 'err');
    setTimeout(function() { doLogin(); }, 3000);
  };

  xhr.send(data);
}

// Enter key support
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    doLogin();
  }
});
</script>
</body>
</html>
